<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #fff; overflow: hidden; }

  .fw-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    background: #fff;
    gap: 1.5rem;
    padding: 0.5rem 1rem;
  }

  .fw-svg-container {
    position: relative;
    flex: 0 0 auto;
  }

  .fw-detail {
    flex: 0 0 160px;
    min-width: 0;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fw-detail-inner { animation: fadeSlide 0.35s ease; }

  .fw-detail-num {
    font-family: Arial, sans-serif; font-size: 24px; font-weight: 700;
    color: #7B1D2E; margin: 0 0 4px; line-height: 1;
  }
  .fw-detail-role {
    font-family: Arial, sans-serif; font-size: 8px; font-weight: 400;
    letter-spacing: 0.2em; color: #7B1D2E; text-transform: uppercase; margin: 0 0 3px;
  }
  .fw-detail-title {
    font-family: Arial, sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; color: #1a1a1a; text-transform: uppercase;
    margin: 0 0 10px; border-bottom: 0.5px solid #e0dbd6; padding-bottom: 8px;
  }
  .fw-detail-body {
    font-family: Arial, sans-serif; font-size: 10px; font-weight: 400;
    color: #666; line-height: 1.7; margin: 0;
  }
</style>
</head>
<body>
<div class="fw-wrap" id="fw-wrap">
  <div class="fw-svg-container" id="fw-container">
    <svg id="fw-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <circle cx="250" cy="250" r="185" fill="none" stroke="#ccc" stroke-width="1"/>
      <circle cx="250" cy="250" r="75" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>
      <text x="250" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#7B1D2E">THE BLACKTOWER</text>
      <text x="250" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#7B1D2E">GOVERNANCE</text>
      <text x="250" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#7B1D2E">FLYWHEEL&#8482;</text>
      <polyline id="trail" points="" fill="none" stroke="#7B1D2E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
      <g id="n1" style="cursor:pointer" onclick="selectNode(1)">
        <circle id="c1" cx="250" cy="65" r="40" fill="#888"/>
        <text x="250" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">01</text>
      </g>
      <text x="250" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" letter-spacing="3" fill="#7B1D2E">THE AXIS</text>
      <text x="250" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#2a2a2a">GOVERNANCE</text>
      <g id="n2" style="cursor:pointer" onclick="selectNode(2)">
        <circle id="c2" cx="415" cy="335" r="40" fill="#888"/>
        <text x="415" y="335" text-anchor="middle" dominant-baseline="central" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">02</text>
      </g>
      <text x="415" y="388" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" letter-spacing="3" fill="#7B1D2E">THE MOMENTUM</text>
      <text x="415" y="403" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#2a2a2a">PORTFOLIO ADVISORY</text>
      <g id="n3" style="cursor:pointer" onclick="selectNode(3)">
        <circle id="c3" cx="85" cy="335" r="40" fill="#888"/>
        <text x="85" y="335" text-anchor="middle" dominant-baseline="central" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">03</text>
      </g>
      <text x="85" y="388" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" letter-spacing="3" fill="#7B1D2E">THE CALIBRATION</text>
      <text x="85" y="403" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#2a2a2a">RISK INTELLIGENCE</text>
    </svg>
  </div>

  <div class="fw-detail">
    <div class="fw-detail-inner" id="fw-detail-inner">
      <p class="fw-detail-num" id="fw-num">01</p>
      <p class="fw-detail-role" id="fw-role">The Axis</p>
      <p class="fw-detail-title" id="fw-title">Governance</p>
      <p class="fw-detail-body" id="fw-body">Investment Policy Statement, delegation of authority matrices, and committee charters. Every decision operates within strictly formalized normative parameters.</p>
    </div>
  </div>
</div>

<script>
const nodeData = {
  1: { num:'01', role:'The Axis',        title:'Governance',        body:'Investment Policy Statement, delegation of authority matrices, and committee charters. Every decision operates within strictly formalized normative parameters.' },
  2: { num:'02', role:'The Momentum',    title:'Portfolio Advisory', body:'Strategic and tactical asset allocation within approved risk parameters. Rigorous evaluation of external manager mandates. Every action is pre-trade validated.' },
  3: { num:'03', role:'The Calibration', title:'Risk Intelligence',  body:'Independent stress-testing of every decision prior to execution. Outputs feed directly back into the Governance loop — closing the system.' }
};

const nodes  = [{ id:1, cx:250, cy:65 }, { id:2, cx:415, cy:335 }, { id:3, cx:85, cy:335 }];
const ACTIVE = '#7B1D2E', IDLE = '#888', TRIGGER = 55, TRAIL_LEN = 90;
let activeNode = null, trailPts = [], angle = -90;

// Responsive SVG size
const wrap = document.getElementById('fw-wrap');
const container = document.getElementById('fw-container');
const svg = document.getElementById('fw-svg');

function resize() {
  const W = wrap.clientWidth || 700;
  const H = wrap.clientHeight || 480;
  const detailW = 160 + 24; // detail + gap
  const size = Math.min(W - detailW - 16, H - 16, 400);
  const s = Math.max(size, 180);
  container.style.width = s + 'px';
  container.style.height = s + 'px';
  svg.setAttribute('width', s);
  svg.setAttribute('height', s);
}
resize();
window.addEventListener('resize', resize);

const mainSvg = document.getElementById('fw-svg');
const trail   = document.getElementById('trail');
const dotEl   = document.createElementNS('http://www.w3.org/2000/svg','circle');
dotEl.setAttribute('r','9');
dotEl.setAttribute('fill','#7B1D2E');
dotEl.setAttribute('pointer-events','none');
mainSvg.insertBefore(dotEl, document.getElementById('n1'));

function setColor(id, color) { document.getElementById('c'+id).setAttribute('fill', color); }

function updateDetail(id) {
  if (activeNode === id) return;
  activeNode = id;
  const d = nodeData[id];
  const inner = document.getElementById('fw-detail-inner');
  inner.style.animation = 'none'; inner.offsetHeight;
  inner.style.animation = 'fadeSlide 0.35s ease';
  document.getElementById('fw-num').textContent   = d.num;
  document.getElementById('fw-role').textContent  = d.role;
  document.getElementById('fw-title').textContent = d.title;
  document.getElementById('fw-body').textContent  = d.body;
}

function selectNode(id) {
  nodes.forEach(n => setColor(n.id, IDLE));
  setColor(id, ACTIVE);
  updateDetail(id);
}

function animate() {
  angle += 0.469;
  const rad  = angle * Math.PI / 180;
  const svgX = 250 + 185 * Math.cos(rad);
  const svgY = 250 + 185 * Math.sin(rad);

  dotEl.setAttribute('cx', svgX);
  dotEl.setAttribute('cy', svgY);

  trailPts.push([svgX, svgY]);
  if (trailPts.length > TRAIL_LEN) trailPts.shift();
  trail.setAttribute('points', trailPts.map(p => p.join(',')).join(' '));

  let closestId = null, minDist = Infinity;
  nodes.forEach(n => {
    const dist = Math.hypot(svgX - n.cx, svgY - n.cy);
    if (dist < minDist) { minDist = dist; closestId = n.id; }
    setColor(n.id, dist < TRIGGER ? ACTIVE : IDLE);
  });
  if (minDist < TRIGGER) updateDetail(closestId);

  requestAnimationFrame(animate);
}

setColor(1, ACTIVE);
updateDetail(1);
animate();
</script>
</body>
</html>
